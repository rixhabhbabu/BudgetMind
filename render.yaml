services:
  - type: web
    name: budgetmind-api
    env: node
    rootDir: apps/backend
    buildCommand: npm install
    startCommand: npm start
  - type: web
    name: budgetmind-ai
    env: python
    rootDir: services/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
