services:
  frontend:
    build: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
  backend:
    build: ./apps/backend
    ports:
      - "5000:5000"
    env_file:
      - .env
  ai-service:
    build: ./services/ai-service
    ports:
      - "8000:8000"
